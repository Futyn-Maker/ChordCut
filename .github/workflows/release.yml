name: Release

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: 'Release notes (Markdown supported; you can edit them later on the release page)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Calculate version
        id: version
        shell: bash
        run: |
          BASE="$(date -u +%Y.%m.%d)"
          TAG="v${BASE}"

          # If a tag for today already exists, append .1, .2, etc.
          if git ls-remote --tags origin "refs/tags/${TAG}" 2>/dev/null | grep -q .; then
            N=1
            while git ls-remote --tags origin "refs/tags/v${BASE}.${N}" 2>/dev/null | grep -q .; do
              N=$((N + 1))
            done
            TAG="v${BASE}.${N}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "py_version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${TAG}"

      - name: Update version in source
        shell: bash
        run: |
          sed -i "s/__version__ = .*/__version__ = \"${{ steps.version.outputs.py_version }}\"/" src/chordcut/__init__.py

      - name: Download libmpv
        shell: pwsh
        run: |
          & build/download_libmpv.ps1 -OutputDir "resources\libmpv"

      - name: Install gettext and pandoc
        shell: pwsh
        run: |
          choco install gettext pandoc -y --no-progress
          echo "C:\Program Files\gettext-iconv\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\Program Files\Pandoc" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Generate translation template (.pot)
        shell: bash
        run: |
          find src/chordcut -name "*.py" | sort | xargs xgettext \
            --add-comments=Translators \
            --from-code=UTF-8 \
            --package-name=ChordCut \
            --package-version="${{ steps.version.outputs.py_version }}" \
            -o locale/chordcut.pot

      - name: Build application
        shell: cmd
        run: build\build.bat

      - name: Create ZIP archive
        shell: pwsh
        run: Compress-Archive -Path "dist\ChordCut" -DestinationPath "ChordCut-Windows.zip"

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/chordcut/__init__.py
          git commit -m "Release ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin main "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ChordCut ${{ steps.version.outputs.tag }}
          body: ${{ github.event.inputs.changelog }}
          files: |
            ChordCut-Windows.zip
            locale/chordcut.pot
          make_latest: true
